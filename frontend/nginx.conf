server {
  listen 80;
  server_name _;

  # Dev browsers accumulate a large cookie pile on the localhost domain (many
  # local apps share it), which overflows nginx's default 8k header buffers and
  # returns "400 Request Header Or Cookie Too Large" before the SPA ever loads.
  # Roomier buffers absorb the cruft so the page still serves.
  large_client_header_buffers 8 64k;
  client_header_buffer_size 16k;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
